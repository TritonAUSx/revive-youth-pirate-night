<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Scanner</title>

<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
.camera-box {
  position: relative;
  width: 100%;
  max-width: 360px;
  aspect-ratio: 1;
  border: 3px solid var(--gold);
  border-radius: 12px;
  overflow: hidden;
  margin: 0 auto;
  background: #000;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

#overlay {
  position: absolute;
  top: 0;
  left: 0;
}

.status {
  text-align: center;
  margin-top: 10px;
  font-family: 'Cinzel', serif;
  color: var(--gold);
  letter-spacing: 1px;
}
</style>
</head>

<body>

<div class="opening-card">
  <div class="oc-header">
    <span class="oc-title">QR Scanner</span>
    <div class="oc-sub">Scan to continue</div>
  </div>

  <div class="oc-body">
    <div class="camera-box">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
    </div>

    <div class="status" id="status">Starting camera...</div>
  </div>
</div>

<script>
const codeReader = new ZXing.BrowserMultiFormatReader();

let controls;
let track;
let zoomLevel = 1;

start();

async function start() {
  try {
    const devices = await codeReader.listVideoInputDevices();

    const deviceId =
      devices.find(d => d.label.toLowerCase().includes("back"))?.deviceId
      || devices[0].deviceId;

    controls = await codeReader.decodeFromVideoDevice(
      deviceId,
      'video',
      (result, err) => {
        if (result) {
          drawBox(result.resultPoints);
          adjustZoom(result.resultPoints);

          stop();
          redirect(result.text);
        }
      }
    );

    const video = document.getElementById("video");
    const stream = video.srcObject;
    track = stream.getVideoTracks()[0];

    setupCanvas();
    document.getElementById("status").textContent = "Scanning...";

  } catch (err) {
    document.getElementById("status").textContent =
      "Camera error: " + err.message;
  }
}

function setupCanvas() {
  const video = document.getElementById("video");
  const canvas = document.getElementById("overlay");

  canvas.width = video.clientWidth;
  canvas.height = video.clientHeight;
}

function drawBox(points) {
  if (!points || points.length < 4) return;

  const canvas = document.getElementById("overlay");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = "#7eff7e";
  ctx.lineWidth = 4;

  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);
  for (let i = 1; i < points.length; i++) {
    ctx.lineTo(points[i].x, points[i].y);
  }
  ctx.closePath();
  ctx.stroke();
}

function adjustZoom(points) {
  if (!track || !points || points.length < 2) return;

  const capabilities = track.getCapabilities();
  if (!capabilities.zoom) return;

  // Calculate QR size
  const width = Math.abs(points[0].x - points[2].x);
  const height = Math.abs(points[1].y - points[3].y);
  const size = (width + height) / 2;

  // Target size range
  const targetMin = 120;
  const targetMax = 220;

  if (size < targetMin && zoomLevel < capabilities.zoom.max) {
    zoomLevel += 0.2;
  } else if (size > targetMax && zoomLevel > capabilities.zoom.min) {
    zoomLevel -= 0.2;
  }

  track.applyConstraints({
    advanced: [{ zoom: zoomLevel }]
  });
}

function stop() {
  if (controls) controls.stop();
}

function redirect(data) {
  if (data.startsWith("http://") || data.startsWith("https://")) {
    window.location.href = data;
  } else {
    document.getElementById("status").textContent = "Invalid QR";
  }
}
</script>

</body>
</html>
