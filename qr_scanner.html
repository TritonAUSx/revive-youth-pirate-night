<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Scanner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>

<style>
body {
  margin: 0;
  background: #000;
  font-family: Arial, sans-serif;
}

.qr-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

.qr-title {
  color: #c9922a;
  font-size: 22px;
  font-weight: bold;
}

.qr-subtitle {
  color: #aaa;
  font-size: 14px;
  margin-bottom: 10px;
}

.camera-box {
  position: relative;
  width: 100%;
  max-width: 360px;
  aspect-ratio: 1;
  border: 3px solid #c9922a;
  border-radius: 12px;
  overflow: hidden;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.scanner-line {
  position: absolute;
  left: 10%;
  width: 80%;
  height: 2px;
  background: #c9922a;
  animation: scan 2s linear infinite;
}

@keyframes scan {
  0% { top: 10%; }
  50% { top: 90%; }
  100% { top: 10%; }
}

.status {
  color: #aaa;
  margin-top: 10px;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="qr-wrapper">
  <div class="qr-title">QR Scanner</div>
  <div class="qr-subtitle">Point camera at code</div>

  <div class="camera-box">
    <video id="video" autoplay playsinline muted></video>
    <div class="scanner-line"></div>
  </div>

  <canvas id="canvas" style="display:none;"></canvas>
  <div class="status" id="status">Starting camera...</div>
</div>

<script>
let scanning = true;

startScanner();

async function startScanner() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: "environment",
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      }
    });

    const video = document.getElementById("video");
    video.srcObject = stream;

    const track = stream.getVideoTracks()[0];
    const capabilities = track.getCapabilities();

    // 🔍 Apply max zoom if supported
    if (capabilities.zoom) {
      track.applyConstraints({
        advanced: [{ zoom: capabilities.zoom.max }]
      });
    }

    document.getElementById("status").textContent = "Scanning...";
    requestAnimationFrame(scan);

  } catch (err) {
    document.getElementById("status").textContent =
      "Camera error: " + err.message;
  }
}

function scan() {
  if (!scanning) return;

  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");

  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");

    // 💡 Boost visibility
    ctx.filter = "contrast(150%) brightness(110%)";
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    ctx.filter = "none";

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

    let code =
      jsQR(imageData.data, imageData.width, imageData.height, {
        inversionAttempts: "attemptBoth"
      });

    if (code) {
      scanning = false;

      // Stop camera
      video.srcObject.getTracks().forEach(t => t.stop());

      // 🚀 Instant redirect
      window.location.href = code.data;
      return;
    }
  }

  requestAnimationFrame(scan);
}
</script>

</body>
</html>
