<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
  <title>Ill Saint Marie</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<div class="panel">
<div class="opening-card">
<div class="oc-header">
  <h2>Ill Saint Marie (Matt)</h2>
</div>
<body>
 <div class="box box-red">
          <div class="box-label lbl-pink">Volunteer's Explanation</div>
          <div class="challenge-text">The goal is the most pushup's within 5 minutes by the entire team, each player must compete. Any variation is accepted </div>
          <div class="box-label lbl-pink">Next Clue</div>
          <div class="q-grid">
          <img id="teamLogo" src="" alt="Select a team" width="150" height="150"  style="display:none;">
          </div>
  </div>
</body>
                <select id="team" onchange="changeImage()">
                    <option value="">-- Select a Team --</option>
                    <option value="blackbeard">Blackbeard</option>
                    <option value="hook">Hook</option>
                    <option value="kenway">Kenway</option>
                    <option value="calico_jack">Calico Jack</option>
                    <option value="sparrow">Sparrow</option>
                </select>

                <script>
                    const teamImages = {
                        blackbeard: "images/Final_Marie.png",
                        hook: "images/Next_Marie.png",
                        sparrow: "images/Next_Marie.png",
                        calico_jack: "images/Next_Marie.png",
                        kenway: "images/Next_Marie.png"
                    };

                    function changeImage() {
                        const select = document.getElementById("team");
                        const img = document.getElementById("teamLogo");
                        const selected = select.value;

                        if (selected && teamImages[selected]) {
                            img.src = teamImages[selected];
                            img.style.display = "block";
                        } else {
                            img.src = "";
                            img.style.display = "none";
                         }
                    }
                </script>
                <div class="oc-body"></div>
<div class="timer-box">
  <div class="timer-text">
    <div id="timer">5:00</div>
  </div><br>
</div>
<div class="action-row">
<button class="start-btn" id="start-btn" onclick="startTimer(300)">Start Timer</button>
<button class="reset-btn" id="reset-btn" onclick="resetTimer(300)">Reset Timer</button>

<script>
  let interval = null;
  let timeLeft = 300;

  function startTimer(seconds) {
    clearInterval(interval);
    timeLeft = seconds;
    updateDisplay();

    interval = setInterval(() => {
      timeLeft--;
      updateDisplay();
      if (timeLeft <= 0) clearInterval(interval);
    }, 1000);
  }

  function resetTimer(seconds) {
    clearInterval(interval);
    timeLeft = seconds;
    updateDisplay();
  }

  function updateDisplay() {
    const mins = Math.floor(timeLeft / 60);
    const secs = timeLeft % 60;
    document.getElementById("timer").textContent =
      `${mins}:${secs.toString().padStart(2, "0")}`;
  }
</script>
<div class="q-grid">
   
    </div></div>
 <input id="score" placeholder="Pushups Completed" style="padding:8px;width:90%;margin:5px;border:1px solid #c9922a;border-radius:6px;">

<button class="miss-btn" onclick="submit()">Submit</button>
</div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzu6S8v9JFdyw9-OMdStp7OGdaLEs6hLZ25AMI6bWhw60O8puXTd9QziAKmQ7O6ZPlY/exec";

let t = 0;
let i;

function start(s){
  clearInterval(i);
  t = s;

  i = setInterval(()=>{
    t--;
    document.getElementById("timer").innerText =
      Math.floor(t/60)+":"+String(t%60).padStart(2,"0");

    if(t<=0) clearInterval(i);
  },1000);
}

function submit(){
  fetch(URL,{
    method:"POST",
    mode:"no-cors",
    headers:{"Content-Type":"text/plain"},
    body:JSON.stringify({
      team:document.getElementById("team").value,
      station:"ILL SAINT-MARIE",
      answer:document.getElementById("score").value,  // ← input → answer
      timeLeft:t
    })
  });
}
</script>   
</div>
</html>
