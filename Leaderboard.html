<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #ffffff;
      font-family: 'Georgia', serif;
      min-height: 100vh;
      padding: clamp(16px, 4vw, 40px);
    }

    h1 {
      text-align: center;
      font-size: clamp(32px, 6vw, 64px);
      color: #c9922a;
      letter-spacing: clamp(2px, 1vw, 6px);
      margin-bottom: clamp(24px, 4vw, 48px);
      text-transform: uppercase;
    }

    .lb-row {
      display: flex;
      align-items: center;
      gap: clamp(12px, 2vw, 24px);
      padding: clamp(12px, 2vw, 24px) clamp(16px, 3vw, 40px);
      margin-bottom: clamp(8px, 1.5vw, 16px);
      border-radius: 12px;
      background: #1a1a1a;
      border: 1px solid #333;
    }

    .lb-1 { border-left: 8px solid #FFD700; background: #1f1a00; }
    .lb-2 { border-left: 8px solid #C0C0C0; background: #1a1a1a; }
    .lb-3 { border-left: 8px solid #cd7f32; background: #1a1000; }
    .lb-4, .lb-5 { border-left: 8px solid #333; }

    .lb-rank {
      font-size: clamp(28px, 5vw, 56px);
      width: clamp(40px, 6vw, 80px);
      text-align: center;
      flex-shrink: 0;
    }

    .lb-team { flex: 1; min-width: 0; }

    .lb-team-name {
      font-size: clamp(22px, 4vw, 48px);
      font-weight: bold;
      color: #ffffff;
      letter-spacing: clamp(1px, 0.3vw, 2px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lb-members {
      display: flex;
      flex-wrap: wrap;
      gap: clamp(4px, 0.8vw, 8px);
      margin-top: clamp(4px, 0.8vw, 8px);
    }

    .lb-member-badge {
      font-size: clamp(11px, 1.8vw, 20px);
      background: transparent;
      color: #c9922a;
      border: 1px solid #c9922a;
      border-radius: 4px;
      padding: 2px clamp(6px, 1vw, 10px);
      font-family: sans-serif;
      white-space: nowrap;
    }

    .lb-score {
      font-size: clamp(24px, 4.5vw, 56px);
      font-weight: bold;
      color: #c9922a;
      min-width: clamp(80px, 12vw, 200px);
      text-align: right;
      flex-shrink: 0;
    }

    #last-updated {
      text-align: center;
      font-size: clamp(12px, 1.8vw, 20px);
      color: #555;
      margin-top: clamp(16px, 3vw, 32px);
      font-family: sans-serif;
    }
  </style>
</head>
<body>

<h1>⚓ Leaderboard</h1>
<div id="leaderboard">Loading...</div>
<div id="last-updated"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzu6S8v9JFdyw9-OMdStp7OGdaLEs6hLZ25AMI6bWhw60O8puXTd9QziAKmQ7O6ZPlY/exec";
const MEDALS = ["🥇", "🥈", "🥉", "4️⃣", "5️⃣"];

function loadLeaderboard() {
  fetch(SCRIPT_URL)
    .then(r => r.json())
    .then(teams => {
      const lb = document.getElementById("leaderboard");
      lb.innerHTML = teams.map((t, i) => `
        <div class="lb-row lb-${i+1}">
          <span class="lb-rank">${MEDALS[i] || i+1}</span>
          <div class="lb-team">
            <div class="lb-team-name">${t.team}</div>
            <div class="lb-members">
              ${(t.members || "").split(",").map(m => `
                <span class="lb-member-badge">${m.trim()}</span>
              `).join("")}
            </div>
          </div>
          <span class="lb-score">${t.score} pts</span>
        </div>
      `).join("");

      document.getElementById("last-updated").textContent =
        "Last updated: " + new Date().toLocaleTimeString();
    })
    .catch(() => {
      document.getElementById("leaderboard").textContent = "Could not load leaderboard.";
    });
}

loadLeaderboard();
setInterval(loadLeaderboard, 30000);
</script>

</body>
</html>
