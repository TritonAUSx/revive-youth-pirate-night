<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
  <title>The Galley</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<div class="panel">
<div class="opening-card">
<div class="oc-header">
  <h2>🍕 The Galley (Sarah van Gaalen)</h2>
  <a class="back-btn" href="galley_answers.html">Answers</a>
</div>
<body>
 <div class="box box-red">
          <div class="box-label lbl-pink">Volunteer's Explanation</div>
          <div class="challenge-text">Each Team Receives the QR Code for the Emoji Questions. </div>
          <div class="box-label lbl-pink">Next Clue  Quiz Sheet</div>
          <div class="q-grid">
          <img id="teamLogo" src="" alt="Select a team" width="150" height="150"  style="display:none;"><img src="images/Galley_Fillout.webp" width="150" height="150">
          </div>
  </div>
</body>
                <select id="team" onchange="changeImage()">
                    <option value="">-- Select a Team --</option>
                    <option value="blackbeard">Blackbeard</option>
                    <option value="hook">Hook</option>
                    <option value="kenway">Kenway</option>
                    <option value="calico_jack">Calico Jack</option>
                    <option value="sparrow">Sparrow</option>
                </select>

                <script>
                    const teamImages = {
                        blackbeard: "images/Next_Galley.png",
                        hook: "images/Final_Galley.png",
                        sparrow: "images/Next_Galley.png",
                        calico_jack: "images/Next_Galley.png",
                        kenway: "images/Next_Galley.png"
                    };

                    function changeImage() {
                        const select = document.getElementById("team");
                        const img = document.getElementById("teamLogo");
                        const selected = select.value;

                        if (selected && teamImages[selected]) {
                            img.src = teamImages[selected];
                            img.style.display = "block";
                        } else {
                            img.src = "";
                            img.style.display = "none";
                         }
                    }
                </script>
<div class="q-grid">
   
    </div></div>
 <input id="score" placeholder="Correct Emojis" style="padding:8px;width:90%;margin:5px;border:1px solid #c9922a;border-radius:6px;">

<button class="miss-btn" onclick="submit()">Submit</button>
</div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzu6S8v9JFdyw9-OMdStp7OGdaLEs6hLZ25AMI6bWhw60O8puXTd9QziAKmQ7O6ZPlY/exec";

let t = 0;
let i;

function start(s){
  clearInterval(i);
  t = s;

  i = setInterval(()=>{
    t--;
    document.getElementById("timer").innerText =
      Math.floor(t/60)+":"+String(t%60).padStart(2,"0");

    if(t<=0) clearInterval(i);
  },1000);
}

function submit(){
  fetch(URL,{
    method:"POST",
    mode:"no-cors",
    headers:{"Content-Type":"text/plain"},
    body:JSON.stringify({
      team:document.getElementById("team").value,
      station:"GALLEY",
      answer:document.getElementById("score").value,  // ← input → answer
      timeLeft:t
    })
  });
}
</script>   
</div>
</html>
